{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-5">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 font-weight-bold">Crear Cuenta</h2>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field.errors }}
                            <input type="{{ field.field.widget.input_type }}" 
                                name="{{ field.name }}" 
                                class="form-control" 
                                placeholder="Ingrese {{ field.label }}">
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 shadow-sm mb-3">Registrarse</button>
                    <div class="text-center">
                        <small class="text-muted">¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión aquí</a></small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
