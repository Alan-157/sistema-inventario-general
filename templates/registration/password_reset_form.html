{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4 p-4">
            <h3 class="fw-bold text-center mb-3">¿Olvidaste tu clave?</h3>
            <p class="text-muted small text-center">Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    {{ form.email.label_tag }}
                    <input type="email" name="email" class="form-control rounded-pill" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold">Enviar Instrucciones</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
