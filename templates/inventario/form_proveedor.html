{% extends 'base.html' %}

{% block content %}
<div class="container mt-2">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="bi bi-truck me-2 text-primary"></i>
                    {% if editando %}Editar{% else %}Registrar{% endif %} Proveedor
                </h3>
                <a href="{% url 'lista_proveedores' %}" class="btn btn-outline-secondary btn-sm shadow-sm">Volver</a>
            </div>

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-bold">Nombre o Razón Social</label>
                            {{ form.nombre }}
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Persona de Contacto</label>
                                {{ form.contacto }}
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Teléfono de Contacto</label>
                                {{ form.telefono }}
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Correo Electrónico</label>
                            {{ form.email }}
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Dirección de Oficina/Bodega</label>
                            {{ form.direccion }}
                        </div>
                        <div class="d-grid mt-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                                <i class="bi bi-save me-2"></i>Guardar Proveedor
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
