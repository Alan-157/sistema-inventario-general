{% extends 'base.html' %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    {% if editando %}<i class="bi bi-pencil-square me-2 text-primary"></i>Editar Categoría
                    {% else %}<i class="bi bi-tags me-2 text-primary"></i>Nueva Categoría{% endif %}
                </h3>
                <a href="{% url 'lista_categorias' %}" class="btn btn-outline-secondary btn-sm shadow-sm"><i class="bi bi-arrow-left"></i> Volver</a>
            </div>

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <form method="POST" novalidate>
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="{{ form.nombre.id_for_label }}" class="form-label fw-bold text-secondary">Nombre de la Categoría</label>
                            {{ form.nombre }}
                            {% if form.nombre.errors %}<div class="text-danger small mt-1">{{ form.nombre.errors }}</div>{% endif %}
                        </div>
                        <div class="mb-4">
                            <label for="{{ form.descripcion.id_for_label }}" class="form-label fw-bold text-secondary">Descripción (Opcional)</label>
                            {{ form.descripcion }}
                        </div>
                        <hr class="text-muted my-4 opacity-25">
                        <div class="d-flex justify-content-end gap-2">
                            <button type="submit" class="btn btn-primary px-4 shadow-sm fw-bold">
                                <i class="bi bi-save me-2"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
