{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex justify-content-center align-items-center mb-4" style="width: 120px; height: 120px;">
                <i class="bi bi-shield-lock-fill text-danger" style="font-size: 4rem;"></i>
            </div>
            
            <h1 class="display-4 fw-bold text-dark mb-3">Acceso Denegado</h1>
            <p class="lead text-muted mb-5">
                Lo sentimos, tu rol actual de <strong>{{ user.get_rol_display }}</strong> no tiene los permisos necesarios para realizar esta acción o visualizar esta página.
            </p>
            
            <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm fw-bold">
                <i class="bi bi-house-door me-2"></i> Volver al Inicio
            </a>
            
        </div>
    </div>
</div>
{% endblock %}
