{% extends 'base.html' %}

{% block content %}
<div class="card shadow">
    <div class="card-header bg-dark text-white d-flex justify-content-between">
        <h4 class="mb-0">Gestión de Usuarios y Roles</h4>
    </div>
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Rol Actual</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for u in usuarios %}
                <tr>
                    <td>{{ u.username }}</td>
                    <td>{{ u.email }}</td>
                    <td><span class="badge bg-secondary">{{ u.get_rol_display }}</span></td>
                    <td>
                        <form action="{% url 'cambiar_rol' u.id %}" method="POST" class="d-inline flex">
                            {% csrf_token %}
                            <select name="rol" class="form-select form-select-sm d-inline w-auto">
                                {% for key, val in u.ROLES %}
                                    {% if key != 'SUPERUSUARIO' or user.rol == 'SUPERUSUARIO' %}
                                    <option value="{{ key }}" {% if u.rol == key %}selected{% endif %}>{{ val }}</option>
                                    {% endif %}
                                {% endfor %}
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary">Actualizar</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
